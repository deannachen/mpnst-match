<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基因变异 × 临床试验匹配 | NFIN 原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2430;
    --ink-soft:#4A5568;
    --paper:#F6F4EF;
    --paper-card:#FFFFFF;
    --line:#DCD8CE;
    --teal:#0F6E56;
    --teal-bg:#E1F5EE;
    --amber:#854F0B;
    --amber-bg:#FAEEDA;
    --coral:#993C1D;
    --coral-bg:#FAECE7;
    --navy-accent:#185FA5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    line-height:1.6;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 20px 80px;}
  header{padding:56px 0 36px;border-bottom:1px solid var(--line);}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--teal);
    margin:0 0 14px;
  }
  h1{
    font-family:'Source Serif 4',serif;
    font-weight:700;
    font-size:34px;
    margin:0 0 14px;
    color:var(--ink);
    letter-spacing:-0.01em;
  }
  .lede{font-size:16px;color:var(--ink-soft);max-width:56ch;margin:0 0 28px;}

  .ladder{display:flex;gap:6px;margin-bottom:8px;}
  .ladder-seg{flex:1;height:6px;border-radius:3px;}
  .ladder-labels{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}

  .disclaimer{
    display:flex;gap:12px;align-items:flex-start;
    background:var(--amber-bg);border:1px solid #F0D9A8;
    border-radius:10px;padding:14px 18px;margin:32px 0;
  }
  .disclaimer .dot{
    flex-shrink:0;width:8px;height:8px;border-radius:50%;
    background:var(--amber);margin-top:6px;
  }
  .disclaimer p{margin:0;font-size:14px;color:#5C3A08;}

  section.panel{padding:36px 0;border-bottom:1px solid var(--line);}
  .panel h2{
    font-family:'Source Serif 4',serif;font-weight:600;
    font-size:20px;margin:0 0 4px;
  }
  .panel .sub{font-size:13px;color:var(--ink-soft);margin:0 0 20px;}

  .gene-grid{display:flex;flex-direction:column;gap:8px;}
  .gene-row{
    display:flex;align-items:center;gap:12px;
    background:var(--paper-card);border:1px solid var(--line);
    border-radius:10px;padding:12px 16px;cursor:pointer;
    transition:border-color .15s ease;
  }
  .gene-row:hover{border-color:var(--navy-accent);}
  .gene-row input{width:17px;height:17px;accent-color:var(--navy-accent);flex-shrink:0;}
  .gene-row .g-name{font-size:14px;font-weight:500;flex:1;}
  .gene-row .g-code{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}

  button#analyze{
    margin-top:22px;width:100%;
    background:var(--ink);color:var(--paper);
    border:none;border-radius:10px;
    font-family:'Inter',sans-serif;font-weight:600;font-size:15px;
    padding:14px;cursor:pointer;
    transition:opacity .15s ease;
  }
  button#analyze:hover{opacity:0.85;}

  .result-card{
    background:var(--paper-card);border:1px solid var(--line);
    border-radius:12px;padding:16px 18px;margin-bottom:10px;
  }
  .result-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:6px;}
  .result-top .name{font-size:14px;font-weight:600;}
  .badge{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:500;letter-spacing:0.02em;
    padding:3px 10px;border-radius:999px;white-space:nowrap;
  }
  .badge.high{background:var(--teal-bg);color:var(--teal);}
  .badge.mid{background:var(--amber-bg);color:var(--amber);}
  .badge.low{background:var(--coral-bg);color:var(--coral);}
  .result-card .meta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);margin:0 0 4px;}
  .result-card .note{font-size:13px;color:var(--ink-soft);margin:0;}

  .section-label{
    font-family:'JetBrains Mono',monospace;font-size:12px;
    text-transform:uppercase;letter-spacing:0.06em;
    color:var(--ink-soft);margin:24px 0 10px;
  }

  footer{padding:32px 0 0;text-align:center;}
  footer p{font-size:12px;color:var(--ink-soft);}

  @media (max-width:520px){
    h1{font-size:27px;}
    header{padding:40px 0 28px;}
  }
</style>
</head>
<body>
<div class="wrap">

<header>
  <p class="eyebrow">NFIN · 分子谱-试验匹配原型</p>
  <h1>你的基因报告，能匹配到哪些方向</h1>
  <p class="lede">勾选报告中检出的变异，查看每一条的证据强度，以及对应的试验或药物方向——每个结果都标注了置信度，不是一份"确定的答案"。</p>
  <div class="ladder">
    <div class="ladder-seg" style="background:var(--teal);"></div>
    <div class="ladder-seg" style="background:var(--amber);"></div>
    <div class="ladder-seg" style="background:var(--coral);"></div>
  </div>
  <div class="ladder-labels"><span>高置信度</span><span>中置信度</span><span>低置信度 / 存疑</span></div>
</header>

<div class="disclaimer">
  <span class="dot"></span>
  <p>这是一份辅助梳理工具，不是治疗建议。所有匹配结果需要由医生或研究协调人复核后，才能用于临床决策或试验申请。</p>
</div>

<section class="panel">
  <h2>第一步：勾选检出的变异</h2>
  <p class="sub">以下为演示数据，实际产品将支持上传报告自动识别。</p>
  <div class="gene-grid" id="gene-list"></div>
  <button id="analyze">生成匹配结果</button>
</section>

<section class="panel" id="results-section" style="display:none;">
  <h2>匹配结果</h2>
  <p class="sub">按置信度排序，点击查看依据。</p>
  <div class="section-label">变异证据强度</div>
  <div id="variant-output"></div>
  <div class="section-label">对应的试验 / 药物方向</div>
  <div id="trial-output"></div>
</section>

</div>

<script>
const GENES = [
  {id:"nf1", label:"NF1 截断突变 + 拷贝数缺失", code:"p.R2429*, VAF~95% · CN 1.1", tier:"high",
    note:"多份独立报告一致检出，核心驱动基因。", trials:[
      {name:"ASTX727（地西他滨类，MPNST 专项试验）", tier:"high", note:"机制针对 PRC2 通路失活，MPNST 专项设计，非泛癌种篮子试验。"}
    ]},
  {id:"mtap", label:"MTAP 纯合缺失", code:"GCN:0 · 临床级检测确认", tier:"high",
    note:"证据等级最高的一条，已实际用于试验入组决策。", trials:[
      {name:"GH56（PRMT5/MTA 协同抑制剂）", tier:"high", note:"已实际入组的现行方案。"},
      {name:"GH56 + MAT2A 联合方案", tier:"high", note:"针对同一代谢脆弱性的联合升级，需向申办方确认是否为耐药后方案。"}
    ]},
  {id:"cdkn2a", label:"CDKN2A/B 纯合缺失", code:"GCN:0", tier:"high",
    note:"三份独立报告方向一致，证据稳固。", trials:[
      {name:"哌柏西利（CDK4/6 抑制剂）", tier:"mid", note:"机制相关，但缺乏 MPNST 专项证据支持。"}
    ]},
  {id:"kit", label:"KIT 扩增", code:"CN 4.58", tier:"mid",
    note:"扩增本身确认存在，但不等同于对特定药物敏感。", trials:[
      {name:"伊马替尼", tier:"low", note:"注意：另一份报告明确将此列为可能耐药/慎重选择，而非敏感。"}
    ]},
  {id:"pdgfra", label:"PDGFRA 扩增", code:"CN 5.88–6.09", tier:"high",
    note:"三份独立报告方向一致。", trials:[
      {name:"安罗替尼 / 帕唑帕尼（多靶点 TKI）", tier:"mid", note:"非试验，属已上市药物，现实可行性高于入组试验。"}
    ]},
  {id:"kras", label:"KRAS p.G12S", code:"VAF 0.32%", tier:"low",
    note:"极低丰度，大概率为亚克隆或背景噪音；另一份报告未检出。", trials:[
      {name:"KRAS G12 系列靶向试验", tier:"low", note:"丰度过低，很可能无法满足入组的克隆性标准。"}
    ]},
  {id:"pten", label:"PTEN 杂合缺失", code:"GCN:1 · 仅单一平台报出", tier:"low",
    note:"另外两份独立报告均未检出此项，大概率为假阳性。", trials:[
      {name:"PI3K 抑制剂类试验", tier:"low", note:"生物学前提证据不足，不建议作为主要依据。"}
    ]}
];

const list = document.getElementById("gene-list");
GENES.forEach(g=>{
  const row = document.createElement("label");
  row.className = "gene-row";
  row.innerHTML = '<input type="checkbox" id="chk-'+g.id+'" checked>'
    + '<span class="g-name">'+g.label+'</span>'
    + '<span class="g-code">'+g.code+'</span>';
  list.appendChild(row);
});

function badge(tier){
  const map = {high:"高置信度", mid:"中置信度", low:"低置信度"};
  return '<span class="badge '+tier+'">'+map[tier]+'</span>';
}

document.getElementById("analyze").addEventListener("click", ()=>{
  const selected = GENES.filter(g=>document.getElementById("chk-"+g.id).checked);
  const section = document.getElementById("results-section");
  const vOut = document.getElementById("variant-output");
  const tOut = document.getElementById("trial-output");

  if(selected.length===0){
    section.style.display = "block";
    vOut.innerHTML = '<p style="color:var(--ink-soft);font-size:14px;">未勾选任何变异。</p>';
    tOut.innerHTML = "";
    return;
  }

  vOut.innerHTML = selected.map(g=>
    '<div class="result-card">'
    + '<div class="result-top"><span class="name">'+g.label+'</span>'+badge(g.tier)+'</div>'
    + '<p class="meta">'+g.code+'</p>'
    + '<p class="note">'+g.note+'</p>'
    + '</div>'
  ).join("");

  let trialsHtml = "";
  selected.forEach(g=>{
    g.trials.forEach(t=>{
      trialsHtml += '<div class="result-card">'
        + '<div class="result-top"><span class="name">'+t.name+'</span>'+badge(t.tier)+'</div>'
        + '<p class="meta">对应变异：'+g.label+'</p>'
        + '<p class="note">'+t.note+'</p>'
        + '</div>';
    });
  });
  tOut.innerHTML = trialsHtml;

  section.style.display = "block";
  section.scrollIntoView({behavior:"smooth", block:"start"});
});

document.getElementById("analyze").click();
document.getElementById("results-section").style.display = "none";
</script>

<footer>
  <p>NFIN 分子谱-试验匹配原型 · 演示数据 · 输出不构成治疗建议</p>
</footer>

</body>
</html>
